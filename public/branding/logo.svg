<svg width="220" height="48" viewBox="0 0 220 48" xmlns="http://www.w3.org/2000/svg">
  <title>PackPal</title>

  <!-- Icon background pill -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="#085041"/>

  <!-- Backpack icon (centered in the badge) -->
  <!-- Main bag body -->
  <rect x="9" y="17" width="22" height="19" rx="4" fill="#EF9F27"/>
  <!-- Bag flap / top curve -->
  <path d="M13 17 Q20 9 27 17" fill="none" stroke="#EF9F27" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bag strap handle -->
  <path d="M16 17 Q20 12 24 17" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- Center pocket -->
  <rect x="13" y="24" width="14" height="9" rx="3" fill="#BA7517" opacity="0.7"/>
  <!-- Zipper line -->
  <line x1="13" y1="22" x2="27" y2="22" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- Teal accent dot top-right -->
  <circle cx="33" cy="11" r="4" fill="#1D9E75"/>
  <circle cx="33" cy="11" r="2" fill="#5DCAA5"/>

  <!-- Wordmark: Pack -->
  <text
    x="50"
    y="33"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#085041"
  >Pack</text>

  <!-- Wordmark: Pal (vibrant teal) -->
  <text
    x="112"
    y="33"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#1D9E75"
  >Pal</text>

  <!-- Tagline -->
  <text
    x="51"
    y="43"
    font-family="Arial, Helvetica, sans-serif"
    font-size="7.5"
    letter-spacing="2.2"
    fill="#0F6E56"
    opacity="0.85"
  >YOUR CARRY STORE</text>
</svg>
